services:
  - type: web
    name: labs-company-website
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SITE_URL
        value: https://labs.in
      - key: ADMIN_TOKEN
        sync: false
